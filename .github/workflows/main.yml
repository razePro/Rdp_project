name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Configure Core RDP Settings
        run: |
          # Enable Remote Desktop and disable Network Level Authentication
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
                             -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "SecurityLayer" -Value 0 -Force

          netsh advfirewall firewall delete rule name="RDP-Tailscale"
          netsh advfirewall firewall add rule name="RDP-Tailscale" dir=in action=allow protocol=TCP localport=3389
          Restart-Service -Name TermService -Force

      - name: Create RDP User with Fixed Password
        run: |
          $password = "Wellshop123!"
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"
          echo "RDP_CREDS=RDP|$password" >> $env:GITHUB_ENV

      - name: Install Tailscale
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $installerPath = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait
          Remove-Item $installerPath -Force

      - name: Establish Tailscale Connection
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up `
              --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} `
              --hostname=github-rdp `
              --accept-dns=true
          
          $tsIP = $null
          $retries = 0
          while (-not $tsIP -and $retries -lt 10) {
              $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
              Start-Sleep -Seconds 5
              $retries++
          }
          if (-not $tsIP) { Write-Error "Tailscale IP not assigned"; exit 1 }
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      - name: Verify RDP Accessibility
        run: |
          $testResult = Test-NetConnection -ComputerName $env:TAILSCALE_IP -Port 3389
          if (-not $testResult.TcpTestSucceeded) { Write-Error "TCP 3389 failed"; exit 1 }

      - name: Download and Unzip Release Asset
        run: |
          $url = "https://github.com/razePro/Rdp_project/releases/download/v1.0.0/yourfile.zip"
          $zipPath = "$env:TEMP\yourfile.zip"
          $documentsPath = "C:\Users\RDP\Documents"
          Invoke-WebRequest -Uri $url -OutFile $zipPath
          New-Item -ItemType Directory -Force -Path $documentsPath | Out-Null
          Expand-Archive -Path $zipPath -DestinationPath $documentsPath -Force


      - name: Send Discord Notification
        run: |
          $embed = @{
              title       = "RDP Started"
              description = "```Address: $env:TAILSCALE_IP`nUsername: RDP`nPassword: Wellshop123!```"
              color       = 65280
              timestamp   = (Get-Date).ToString("yyyy-MM-ddTHH:mm:ssZ")
          }

          $body = @{
              embeds = @($embed)
          } | ConvertTo-Json -Depth 4

          Invoke-RestMethod -Uri "https://discord.com/api/v10/webhooks/1484450243176173661/h_EaHwyx3p_HLrhTc0zBCZ1BSAQpo5BfjUk2Dx1R_3QhLTKyWeBWQCKfYFNxjtanR1_q" `
                            -Method Post `
                            -ContentType "application/json" `
                            -Body $body
      
      - name: Maintain Connection & Auto-Relaunch
        run: |
          $startTime = Get-Date
          $timeout = New-TimeSpan -Hours 5 -Minutes 50

          Write-Host "`n=== RDP ACCESS ==="
          Write-Host "Address: $env:TAILSCALE_IP"
          Write-Host "Username: RDP"
          Write-Host "Password: $(echo $env:RDP_CREDS)"
          Write-Host "==================`n"

          while ($true) {
              $elapsed = (Get-Date) - $startTime
              
              if ($elapsed -ge $timeout) {
                  Write-Host "5 hours 50 minutes reached. Relaunching workflow..."

                  # Relaunch workflow using PAT
                  $body = @{ ref = "rdp" } | ConvertTo-Json
                  Invoke-RestMethod -Uri "https://api.github.com/repos/razePro/Rdp_project/actions/workflows/main.yml/dispatches" `
                                    -Method Post `
                                    -Headers @{ Authorization = "Bearer $env:PAT"; Accept = "application/vnd.github+json" } `
                                    -Body $body

                  Write-Host "Workflow relaunched. Exiting current runner."
                  break
              }

              Write-Host "[$(Get-Date)] RDP Active - Waiting..."
              Start-Sleep -Seconds 300
          }
