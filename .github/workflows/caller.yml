name: Trigger main.yml on RDP

on:
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger main.yml workflow
        run: |
          curl -X POST \
          -H "Authorization: Bearer ${{ secrets.PAT }}" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/razePro/Rdp_project/actions/workflows/main.yml/dispatches \
          -d '{"ref":"rdp"}'
