name: Trigger rdp and notify

on:
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger rdp workflow
        run: |
          curl -X POST \
          -H "Authorization: Bearer ${{ secrets.PAT }}" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/razePro/Rdp_project/actions/workflows/main.yml/dispatches \
          -d '{"ref":"rdp"}'

      - name: Send Discord notification
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{
                     "embeds": [
                       {
                         "title": "RDP Started",
                         "description": "The `rdp` workflow has started successfully.",
                         "color": 65280,
                         "timestamp": "'"$(date -u +"%Y-%m-%dT%H:%M:%SZ")"'"
                       }
                     ]
                   }' \
               https://discord.com/api/v10/webhooks/1484450243176173661/h_EaHwyx3p_HLrhTc0zBCZ1BSAQpo5BfjUk2Dx1R_3QhLTKyWeBWQCKfYFNxjtanR1_q
